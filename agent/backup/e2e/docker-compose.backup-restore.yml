services:
  e2e-br-mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mock-server
    volumes:
      - backup-storage:/backup-storage
    container_name: e2e-br-mock-server
    environment:
      PG_VERSION: ${PG_VERSION:-17}
    networks:
      - br-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4050/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e-br-runner:
    build:
      context: .
      dockerfile: Dockerfile.backup-restore-runner
      args:
        PG_VERSION: ${PG_VERSION:-17}
    volumes:
      - ./artifacts:/opt/agent/artifacts:ro
      - ./scripts:/opt/agent/scripts:ro
    depends_on:
      e2e-br-mock-server:
        condition: service_healthy
    container_name: e2e-br-runner
    networks:
      - br-net
    command: ["bash", "/opt/agent/scripts/test-pg-host-path.sh"]
    environment:
      MOCK_SERVER_OVERRIDE: "http://e2e-br-mock-server:4050"

  e2e-br-docker-runner:
    build:
      context: .
      dockerfile: Dockerfile.backup-restore-docker-runner
    volumes:
      - ./artifacts:/opt/agent/artifacts:ro
      - ./scripts:/opt/agent/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - br-docker-restored:/restored-pgdata
      - br-docker-wal-queue:/wal-queue
    depends_on:
      e2e-br-mock-server:
        condition: service_healthy
    container_name: e2e-br-docker-runner
    networks:
      - br-net
    command: ["bash", "/opt/agent/scripts/test-pg-docker-restore.sh"]
    environment:
      MOCK_SERVER_OVERRIDE: "http://e2e-br-mock-server:4050"
      PG_VERSION: ${PG_VERSION:-17}
      BR_NETWORK: br-net-${PG_VERSION:-17}
      RESTORED_VOLUME: br-docker-restored-${PG_VERSION:-17}
      WAL_QUEUE_VOLUME: br-docker-wal-queue-${PG_VERSION:-17}

volumes:
  backup-storage:
  br-docker-restored:
    name: br-docker-restored-${PG_VERSION:-17}
  br-docker-wal-queue:
    name: br-docker-wal-queue-${PG_VERSION:-17}

networks:
  br-net:
    name: br-net-${PG_VERSION:-17}
