services:
  # ================================================================
  # Local image build (opt-in via profile)
  # ================================================================

  # For local development only to test build. This service is gated
  # behind the "image" profile so it does NOT start with a plain
  # `docker compose up -d`. To run: docker compose up databasus-local
  databasus-local:
    profiles: ["image"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    volumes:
      - ./databasus-data:/databasus-data
    container_name: databasus-local
    restart: unless-stopped

  # ================================================================
  # Backend dev services
  # ================================================================

  # For development only, because this DB
  # exposes its port to the public
  backend-db:
    image: postgres:17
    ports:
      - "${BACKEND_DB_PORT:-5437}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    container_name: backend-db
    shm_size: 10gb

  # Dedicated test DB so `make test` doesn't pollute the dev DB
  backend-db-test:
    image: postgres:17
    ports:
      - "${BACKEND_DB_TEST_PORT:-5438}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - ./pgdata-test:/var/lib/postgresql/data
    container_name: backend-db-test
    shm_size: 10gb

  # Valkey for caching
  backend-valkey:
    image: valkey/valkey:9.0.1-alpine
    ports:
      - "${VALKEY_PORT}:6379"
    volumes:
      - ./valkey-data:/data
    container_name: backend-valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # VictoriaLogs for external logging
  backend-victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: backend-victoria-logs
    ports:
      - "${BACKEND_VICTORIA_LOGS_PORT:-9428}:9428"
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
      - -httpAuth.password=devpassword
    volumes:
      - ./victoria-logs-data:/victoria-logs-data
    restart: unless-stopped

  # ================================================================
  # Agent dev services
  # ================================================================

  agent-db:
    image: postgres:17
    container_name: agent-db
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "${AGENT_DB_PORT:-7433}:5432"
    command:
      - bash
      - -c
      - |
        mkdir -p /wal-queue && chown postgres:postgres /wal-queue
        exec docker-entrypoint.sh postgres \
          -c wal_level=replica \
          -c max_wal_senders=3 \
          -c archive_mode=on \
          -c "archive_command=cp %p /wal-queue/%f"
    volumes:
      - ./wal-queue:/wal-queue
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 2s
      timeout: 5s
      retries: 30

  # ================================================================
  # Test containers
  # ================================================================

  # Test MinIO container
  test-minio:
    image: minio/minio:latest
    ports:
      - "${TEST_MINIO_PORT}:9000"
      - "${TEST_MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=testuser
      - MINIO_ROOT_PASSWORD=testpassword
    container_name: test-minio
    command: server /data --console-address ":9001"

  # Test PostgreSQL containers
  test-postgres-12:
    image: postgres:12
    ports:
      - "${TEST_POSTGRES_12_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-12
    shm_size: 1gb

  test-postgres-13:
    image: postgres:13
    ports:
      - "${TEST_POSTGRES_13_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-13
    shm_size: 1gb

  test-postgres-14:
    image: postgres:14
    ports:
      - "${TEST_POSTGRES_14_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-14
    shm_size: 1gb

  test-postgres-15:
    image: postgres:15
    ports:
      - "${TEST_POSTGRES_15_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-15
    shm_size: 1gb

  test-postgres-16:
    image: postgres:16
    ports:
      - "${TEST_POSTGRES_16_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-16
    shm_size: 1gb

  test-postgres-17:
    image: postgres:17
    ports:
      - "${TEST_POSTGRES_17_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-17
    shm_size: 1gb

  test-postgres-18:
    image: postgres:18
    ports:
      - "${TEST_POSTGRES_18_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-postgres-18
    shm_size: 1gb

  # Test Azurite container
  test-azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "${TEST_AZURITE_BLOB_PORT}:10000"
    container_name: test-azurite
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck

  # Test NAS server (Samba)
  test-nas:
    image: dperson/samba:latest
    ports:
      - "${TEST_NAS_PORT}:445"
    environment:
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./temp/nas:/shared
    command: >
      -u "testuser;testpassword"
      -s "backups;/shared;yes;no;no;testuser"
      -p
    container_name: test-nas

  # Test FTP server
  test-ftp:
    image: stilliard/pure-ftpd:latest
    ports:
      - "${TEST_FTP_PORT}:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
      - FTP_USER_NAME=testuser
      - FTP_USER_PASS=testpassword
      - FTP_USER_HOME=/home/ftpusers/testuser
      - FTP_PASSIVE_PORTS=30000:30009
    container_name: test-ftp

  # Test SFTP server
  test-sftp:
    image: atmoz/sftp:latest
    ports:
      - "${TEST_SFTP_PORT}:22"
    command: testuser:testpassword:1001::upload
    container_name: test-sftp

  # ================================================================
  # SSL / TLS test containers
  # One representative version per engine — the goal is to catch SSL
  # handshake regressions without multiplying the version matrix.
  # ================================================================

  test-postgres-ssl:
    build:
      context: ./backend/internal/features/tests/testdata/ssl
      dockerfile_inline: |
        FROM postgres:18
        COPY server.key /etc/ssl-test/server.key
        COPY server.crt /etc/ssl-test/server.crt
        COPY pg_hba.conf /etc/ssl-test/pg_hba.conf
        RUN chown postgres:postgres /etc/ssl-test/server.key /etc/ssl-test/server.crt /etc/ssl-test/pg_hba.conf \
         && chmod 600 /etc/ssl-test/server.key \
         && chmod 644 /etc/ssl-test/server.crt /etc/ssl-test/pg_hba.conf
    ports:
      - "${TEST_POSTGRES_SSL_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command: postgres -c ssl=on -c ssl_cert_file=/etc/ssl-test/server.crt -c ssl_key_file=/etc/ssl-test/server.key -c hba_file=/etc/ssl-test/pg_hba.conf
    container_name: test-postgres-ssl
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Enforces mutual TLS - rejects TCP clients without a CA-signed client cert.
  test-postgres-mtls:
    build:
      context: ./backend/internal/features/tests/testdata/mtls
      dockerfile_inline: |
        FROM postgres:18
        COPY server.key /etc/ssl-test/server.key
        COPY server.crt /etc/ssl-test/server.crt
        COPY ca.crt /etc/ssl-test/ca.crt
        COPY pg_hba.conf /etc/ssl-test/pg_hba.conf
        RUN chown postgres:postgres /etc/ssl-test/server.key /etc/ssl-test/server.crt /etc/ssl-test/ca.crt /etc/ssl-test/pg_hba.conf \
         && chmod 600 /etc/ssl-test/server.key \
         && chmod 644 /etc/ssl-test/server.crt /etc/ssl-test/ca.crt /etc/ssl-test/pg_hba.conf
    ports:
      - "${TEST_POSTGRES_MTLS_PORT:-5181}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command: postgres -c ssl=on -c ssl_cert_file=/etc/ssl-test/server.crt -c ssl_key_file=/etc/ssl-test/server.key -c ssl_ca_file=/etc/ssl-test/ca.crt -c hba_file=/etc/ssl-test/pg_hba.conf
    container_name: test-postgres-mtls
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

